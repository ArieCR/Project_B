<!DOCTYPE html>
<html>
<head>
<title>Combined Visualizations</title>
<style>
  body {
    font-family: sans-serif;
    margin: 0;
  }
  .visualization-container {
    /* No styles here for a seamless look */
  }
  h2 {
    padding: 20px;
    margin: 0;
    background-color: #f8f8f8;
  }
  iframe {
    border: none;
    width: 100%;
    display: block;
  }
</style>
</head>
<body>
<h1>Combined Visualizations</h1>

<div class="visualization-container">
  <h2>1.1 Compression Animation</h2>
  <iframe src="visualize_1_1_compression_animation.html" scrolling="no"></iframe>
</div>

<div class="visualization-container">
  <h2>1.2 Constellation Morph</h2>
  <iframe src="visualize_1_2_constellation_morph.html" scrolling="no"></iframe>
</div>

<div class="visualization-container">
  <h2>1.5 OFDM Explorer</h2>
  <iframe src="visualize_1_5_ofdm_explorer.html" scrolling="no"></iframe>
</div>

<div class="visualization-container">
  <h2>2.1 OFDM Modulation</h2>
  <iframe src="visualize_2_1_OFDM_Modulation.html" scrolling="no"></iframe>
</div>

<div class="visualization-container">
  <h2>2.2 LTE Bandwidth vs RBs</h2>
  <iframe src="visualize_2_2_LTE_bandwidth_vs_rbs.html" scrolling="no"></iframe>
</div>

<div class="visualization-container">
  <h2>2.7 Different Modulation Schemes</h2>
  <iframe src="visualize_2_7_Different_modulation_schemes.html" scrolling="no"></iframe>
</div>

<div class="visualization-container">
  <h2>3.2 Transmission Reception Layer</h2>
  <iframe src="visualize_3_2_transmission_reception_layer.html" scrolling="no"></iframe>
</div>

<script>
  function resizeIframe(iframe) {
    try {
      const height = iframe.contentWindow.document.body.scrollHeight;
      iframe.style.height = height + 'px';
    } catch (e) {
      console.error("Could not resize iframe: ", e);
    }
  }

  document.querySelectorAll('iframe').forEach(function(iframe) {
    iframe.addEventListener('load', function() {
      resizeIframe(this);
    });
    // For iframes that might be cached and already loaded
    if (iframe.contentWindow.document.readyState === 'complete') {
      resizeIframe(iframe);
    }
  });
</script>

</body>
</html>
