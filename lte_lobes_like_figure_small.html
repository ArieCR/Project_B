<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>LTE lobes (small HTML)</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Arial, sans-serif; }
    #titlebox { text-align:center; padding-top:14px; }
    #titlebox h1 { margin:0; font-size:22px; font-weight:700; }
    #titlebox p  { margin:4px 0 8px; font-size:14px; color:#333; }
    #controls { position:fixed; left:12px; bottom:12px; background:rgba(255,255,255,0.9);
                 border:1px solid rgba(0,0,0,.15); border-radius:8px; padding:6px 8px; display:flex; gap:6px; z-index:10; }
    #controls button { border:1px solid #c9c9c9; background:#fff; padding:6px 10px; border-radius:6px; cursor:pointer; }
    #controls button.active { background:#ecf3ff; border-color:#7aa7ff; }
    #plot { width:100vw; height: calc(100vh - 96px); }
  </style>
</head>
<body>
  <div id="titlebox">
    <h1>OFDMA vs SC-FDMA (arched lobes per subcarrier & symbol)</h1>
    <p>Smooth lobes per subcarrier and symbol; empty gap before each symbol is the CP.</p>
  </div>
  <div id="controls">
    <button id="btn-ofdma" class="active">OFDMA (downlink)</button>
    <button id="btn-scfdma">SC-FDMA (uplink-style contiguous)</button>
  </div>
  <div id="plot"></div>

  <script>
  const P = {"title":"OFDMA vs SC-FDMA (arched lobes per subcarrier & symbol)","subtitle":"Smooth lobes per subcarrier and symbol; empty gap before each symbol is the CP.","n_sc":12,"n_sym":6,"n_users":4,"sigma_f":0.38,"cp_ratio":0.12,"grid_f_pts":25,"grid_t_pts":17,"palette":["#e41a1c","#377eb8","#4daf4a","#984ea3","#ff7f00","#a65628","#f781bf","#999999"],"alloc_ofdma":[[0,0,0,0.974],[0,4,0,0.948],[0,8,0,1.023],[0,4,1,0.936],[0,8,1,1.005],[0,0,1,0.98],[0,8,2,0.934],[0,0,2,1.001],[0,4,2,0.931],[0,0,3,0.99],[0,4,3,0.935],[0,8,3,0.939],[1,2,0,0.989],[1,6,0,1.049],[1,10,0,0.944],[1,6,1,0.958],[1,10,1,1.019],[1,2,1,1.067],[1,10,2,1.012],[1,2,2,0.985],[1,6,2,1.071],[1,2,3,0.932],[1,6,3,1.054],[1,10,3,0.968],[2,4,0,0.947],[2,8,0,0.943],[2,0,0,0.971],[2,8,1,1.047],[2,0,1,0.952],[2,4,1,1.012],[2,0,2,1.021],[2,4,2,0.981],[2,8,2,1.007],[2,4,3,0.934],[2,8,3,0.934],[2,0,3,0.956],[3,6,0,1.027],[3,10,0,0.989],[3,2,0,0.972],[3,10,1,1.013],[3,2,1,0.993],[3,6,1,0.97],[3,2,2,1.044],[3,6,2,1.03],[3,10,2,0.962],[3,6,3,1.011],[3,10,3,1.004],[3,2,3,1.056],[4,8,0,1.034],[4,0,0,0.968],[4,4,0,1.072],[4,0,1,0.943],[4,4,1,0.988],[4,8,1,1.039],[4,4,2,0.948],[4,8,2,0.998],[4,0,2,0.931],[4,8,3,1.025],[4,0,3,1.04],[4,4,3,1.011],[5,10,0,1.056],[5,2,0,0.972],[5,6,0,1.029],[5,2,1,1.014],[5,6,1,1.012],[5,10,1,0.993],[5,6,2,1.051],[5,10,2,1.067],[5,2,2,0.996],[5,10,3,1.025],[5,2,3,0.934],[5,6,3,1.03]],"alloc_scfdma":[[0,0,0,1.022],[0,1,0,1.074],[0,2,0,1.048],[0,3,1,0.968],[0,4,1,0.983],[0,5,1,1.025],[0,6,2,0.928],[0,7,2,0.994],[0,8,2,0.95],[0,9,3,0.943],[0,10,3,0.934],[0,11,3,1.04],[1,2,0,0.944],[1,3,0,0.962],[1,4,0,0.984],[1,5,1,1.056],[1,6,1,0.937],[1,7,1,0.992],[1,8,2,1.007],[1,9,2,1.058],[1,10,2,1.048],[1,11,3,1.055],[1,0,3,0.967],[1,1,3,0.987],[2,4,0,0.979],[2,5,0,1.058],[2,6,0,1.069],[2,7,1,0.948],[2,8,1,0.951],[2,9,1,0.96],[2,10,2,0.96],[2,11,2,0.998],[2,0,2,1.013],[2,1,3,0.964],[2,2,3,0.926],[2,3,3,0.988],[3,6,0,0.98],[3,7,0,1.01],[3,8,0,1.068],[3,9,1,1.029],[3,10,1,1.002],[3,11,1,1.018],[3,0,2,1.026],[3,1,2,0.933],[3,2,2,1.06],[3,3,3,1.042],[3,4,3,1.056],[3,5,3,1.045],[4,8,0,0.984],[4,9,0,0.985],[4,10,0,0.941],[4,11,1,1.02],[4,0,1,0.934],[4,1,1,0.935],[4,2,2,0.956],[4,3,2,0.949],[4,4,2,0.976],[4,5,3,0.933],[4,6,3,0.925],[4,7,3,0.948],[5,10,0,0.94],[5,11,0,0.98],[5,0,0,0.929],[5,1,1,1.056],[5,2,1,1.017],[5,3,1,0.947],[5,4,2,0.963],[5,5,2,0.977],[5,6,2,0.98],[5,7,3,0.943],[5,8,3,1.052],[5,9,3,1.074]]};

  // Smooth raised-cosine time window
  function timeEnv(t, t0, t1, roll=0.2) {
    const L = t1 - t0, a = roll*L;
    if (t < t0 || t > t1) return 0;
    if (t < t0 + a) {
      const tau = (t - t0)/a; return 0.5 - 0.5*Math.cos(Math.PI*tau);
    }
    if (t > t1 - a) {
      const tau = (t1 - t)/a; return 0.5 - 0.5*Math.cos(Math.PI*tau);
    }
    return 1;
  }

  // Build one lobe Surface (computed client-side)
  function lobeSurface(kc, tc, amp, color) {
    const fmin = kc - 1.2, fmax = kc + 1.2;
    const t0 = tc + P.cp_ratio, t1 = tc + 1.0;
    const fn = P.grid_f_pts, tn = P.grid_t_pts;

    // Build grids and Z
    let xs = new Array(fn), ys = new Array(tn);
    for (let i=0;i<fn;i++) xs[i] = fmin + (fmax-fmin)*i/(fn-1);
    for (let j=0;j<tn;j++) ys[j] = t0 + (t1-t0)*j/(tn-1);

    // Flat arrays for Surface
    const z = new Array(tn).fill(0).map(_ => new Array(fn).fill(0));
    for (let j=0;j<tn;j++) {
      const te = timeEnv(ys[j], t0, t1, 0.2);
      for (let i=0;i<fn;i++) {
        const gf = Math.exp(-0.5 * Math.pow((xs[i]-kc)/P.sigma_f, 2));
        z[j][i] = amp * gf * te;
      }
    }
    // Constant-color surface via colorscale endpoints
    return {
      type: 'surface',
      x: xs, y: ys, z: z,
      showscale: false,
      colorscale: [[0, color],[1, color]],
      opacity: 1.0,
      hoverinfo: 'skip'
    };
  }

  function buildMode(mode) {
    const alloc = (mode === 'OFDMA') ? P.alloc_ofdma : P.alloc_scfdma;
    const traces = [];
    for (const [t, k, u, a] of alloc) {
      const color = P.palette[u % P.palette.length];
      traces.push(lobeSurface(k, t, a, color));
    }
    // CP translucent plates
    const xMin = -0.8, xMax = P.n_sc - 1 + 0.8;
    for (let s=0; s<P.n_sym; s++) {
      const ycp = s + P.cp_ratio;
      traces.push({
        type:'surface',
        x:[[xMin,xMax],[xMin,xMax]],
        y:[[ycp,ycp],[ycp,ycp]],
        z:[[0,0],[1.15,1.15]],
        showscale:false,
        opacity:0.10,
        hoverinfo:'skip'
      });
    }
    return traces;
  }

  let currentMode = 'OFDMA';
  let traces = buildMode(currentMode);

  const layout = {
    margin: {l:0, r:0, t:10, b:0},
    scene: {
      xaxis: {
        title: 'Frequency (subcarriers, 15 kHz spacing)',
        range: [-0.8, P.n_sc-1+0.8],
        gridcolor: 'lightgray'
      },
      yaxis: {
        title: 'Time (symbols with CP gaps)',
        range: [-0.1, P.n_sym+0.2],
        gridcolor: 'lightgray'
      },
      zaxis: {
        title: 'Amplitude',
        range: [0, 1.2],
        gridcolor: 'lightgray'
      },
      aspectratio: {x:1.6, y:1.0, z:0.6},
      camera: {eye: {x:1.6, y:1.4, z:0.9}}
    }
  };

  Plotly.newPlot('plot', traces, layout, {responsive:true});

  // Buttons
  const btnOfdma = document.getElementById('btn-ofdma');
  const btnScf   = document.getElementById('btn-scfdma');
  function setActive(which) {
    btnOfdma.classList.toggle('active', which==='OFDMA');
    btnScf.classList.toggle('active',   which==='SCFDMA');
  }
  btnOfdma.onclick = () => {
    if (currentMode === 'OFDMA') return;
    currentMode = 'OFDMA'; setActive('OFDMA');
    Plotly.react('plot', buildMode('OFDMA'), layout);
  };
  btnScf.onclick = () => {
    if (currentMode === 'SCFDMA') return;
    currentMode = 'SCFDMA'; setActive('SCFDMA');
    Plotly.react('plot', buildMode('SCFDMA'), layout);
  };
  </script>
</body>
</html>
